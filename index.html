<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LabApp - الإصدار المطور</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f8f9fa;
    --border: rgba(0,0,0,0.1);
    --accent: #0099ff; /* لون أزرق أوضح */
    --text: #2d3436;
    --success: #00b894;
    --shadow: 0 4px 15px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

  /* Header & Navigation */
  header {
    background: var(--bg); border-bottom: 2px solid var(--bg2);
    padding: 0 20px; height: 65px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 1000;
  }
  .menu-btn { background: none; border: none; font-size: 28px; cursor: pointer; }
  .logo { font-size: 22px; font-weight: 800; }
  .logo span { color: var(--accent); }

  /* Side Menu */
  .side-menu {
    position: fixed; top: 0; right: -100%; width: 280px; height: 100%;
    background: var(--bg); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -10px 0 30px rgba(0,0,0,0.1); padding: 30px 20px;
  }
  .side-menu.open { right: 0; }
  .menu-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
    display: none; z-index: 1500; backdrop-filter: blur(4px);
  }
  .menu-overlay.show { display: block; }
  .menu-link {
    width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--bg2);
    margin-bottom: 12px; font-family: 'Tajawal'; font-size: 16px; font-weight: 700;
    text-align: right; cursor: pointer;
  }
  .menu-link.active { background: var(--accent); color: #fff; }

  /* Grid & Cards */
  main { padding: 20px; }
  .barrel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
  
  .barrel-card {
    background: #fff; border: 2px solid var(--bg2); border-radius: 24px;
    padding: 20px 10px; display: flex; flex-direction: column; align-items: center;
    box-shadow: var(--shadow); transition: 0.3s;
  }
  .barrel-wrap { width: 100px; height: 100px; margin-bottom: 15px; position: relative; }
  canvas { width: 100px; height: 100px; border-radius: 50%; display: block; }

  /* Buttons & Inputs */
  .btn {
    padding: 14px; border-radius: 14px; border: none; font-family: 'Tajawal';
    font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  
  input {
    width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--bg2);
    margin-bottom: 15px; font-family: 'Tajawal'; font-size: 15px; outline: none;
  }
  input:focus { border-color: var(--accent); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; padding: 20px; z-index: 3000;
  }
  .modal { background: #fff; width: 100%; max-width: 400px; border-radius: 25px; padding: 25px; }

  .toasts { position: fixed; top: 80px; left: 20px; right: 20px; z-index: 4000; }
  .toast { background: #333; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: center; }
</style>
</head>
<body>

<header>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <div class="logo">Lab<span>App</span></div>
  <div style="width:30px"></div>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu">
  <h2 style="margin-bottom:25px">الأقسام</h2>
  <button class="menu-link active" data-nav="inventory" onclick="navTo('inventory')">المخزون</button>
  <button class="menu-link" data-nav="lab" onclick="navTo('lab')">المعمل</button>
  <button class="menu-link" data-nav="products" onclick="navTo('products')">المنتجات</button>
</div>

<main>
  <div class="page active" id="page-inventory">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px">
      <h2>المخزون</h2>
      <button class="btn btn-primary" style="width:auto; padding:10px 20px" onclick="openAdd()">+ مادة</button>
    </div>
    <div class="barrel-grid" id="barrelGrid"></div>
  </div>

  <div class="page" id="page-lab">
    <h2>المعمل</h2>
    <input type="text" id="prodName" placeholder="اسم المنتج الجديد">
    <div id="ingList" style="margin-bottom:20px"></div>
    <button class="btn btn-success" onclick="buildProduct()">حفظ المنتج النهائي</button>
  </div>

  <div class="page" id="page-products">
    <h2>المنتجات المحفوظة</h2>
    <div id="productsGrid" class="barrel-grid" style="grid-template-columns: 1fr;"></div>
  </div>
</main>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h3 style="margin-bottom:20px">إضافة مادة جديدة</h3>
        <input type="text" id="matName" placeholder="اسم المادة" onkeydown="handleEnter(event, 'matQty')">
        <input type="number" id="matQty" placeholder="الكمية بالجرام" onkeydown="handleEnter(event, 'matPrice')">
        <input type="number" id="matPrice" placeholder="سعر الجرام الواحد" onkeydown="handleEnter(event, 'saveBtn')">
        <button id="saveBtn" class="btn btn-primary" onclick="saveMaterial()">حفظ في المخزون</button>
        <button class="btn" style="margin-top:10px" onclick="closeAdd()">إلغاء</button>
    </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
let materials = JSON.parse(localStorage.getItem('lab_materials')) || [];
let products = JSON.parse(localStorage.getItem('lab_products')) || [];
const waveState = {};
let shakeForce = 0;
let tiltAngle = 0;

// --- 1. إصلاح الجيروسكوب وحركة السائل ---
if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    // للأيفون يحتاج إذن
    document.body.addEventListener('click', () => {
        DeviceOrientationEvent.requestPermission();
        DeviceMotionEvent.requestPermission();
    }, {once: true});
}

window.addEventListener('deviceorientation', (e) => {
    tiltAngle = (e.gamma || 0) / 45; // حساسية أعلى للميل
});

window.addEventListener('devicemotion', (e) => {
    let acc = e.acceleration;
    if (!acc) return;
    let force = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
    if (force > 12) shakeForce = Math.min(force/20, 1.5);
});

// --- 2. التنقل بزر Enter ---
function handleEnter(event, nextId) {
    if (event.key === 'Enter') {
        event.preventDefault();
        const nextElem = document.getElementById(nextId);
        if (nextElem) nextElem.focus();
        if (nextId === 'saveBtn') saveMaterial();
    }
}

// --- 3. إدارة البيانات والمواد ---
function saveMaterial() {
    const nameInput = document.getElementById('matName');
    const qtyInput = document.getElementById('matQty');
    const priceInput = document.getElementById('matPrice');
    
    const name = nameInput.value.trim();
    const qty = parseFloat(qtyInput.value);
    const price = parseFloat(priceInput.value);

    if (!name || isNaN(qty)) return toast('يرجى ملء البيانات بشكل صحيح');

    // منع تكرار الاسم
    const exists = materials.some(m => m.name.toLowerCase() === name.toLowerCase());
    if (exists) return toast('هذه المادة موجودة بالفعل بالمخزون');

    // ألوان واضحة وقوية
    const brightColors = ['#00d2ff', '#341f97', '#ee5253', '#05c46b', '#ffa801', '#ef5777'];
    const color = brightColors[materials.length % brightColors.length];

    materials.push({ id: Date.now(), name, qty, price, color });
    localStorage.setItem('lab_materials', JSON.stringify(materials));
    
    // تصفير الحقول بعد الحفظ
    nameInput.value = ''; qtyInput.value = ''; priceInput.value = '';
    
    closeAdd();
    renderInventory();
    toast('تمت الإضافة بنجاح');
}

// --- 4. محرك الرسم المتطور ---
function animateLiquid(canvas, color, fillPct) {
    const id = canvas.dataset.matid;
    const ctx = canvas.getContext('2d');
    const W = canvas.width = 200;
    const H = canvas.height = 200;
    
    if(!waveState[id]) waveState[id] = { offset: 0, currentTilt: 0 };
    const s = waveState[id];

    function render() {
        ctx.clearRect(0,0,W,H);
        
        // رسم الدائرة الخارجية (الصندوق)
        ctx.beginPath();
        ctx.arc(W/2, H/2, 98, 0, Math.PI*2);
        ctx.strokeStyle = '#eee';
        ctx.lineWidth = 4;
        ctx.stroke();
        
        ctx.save();
        ctx.beginPath(); ctx.arc(W/2, H/2, 96, 0, Math.PI*2); ctx.clip();

        // السائل
        s.currentTilt += (tiltAngle - s.currentTilt) * 0.1;
        shakeForce *= 0.95; // هدوء تدريجي
        
        let level = H * (1 - fillPct);
        let waveAmp = 5 + (shakeForce * 25);
        s.offset += 0.05 + (shakeForce * 0.2);

        ctx.beginPath();
        ctx.moveTo(0, level);
        for(let x=0; x<=W; x+=5) {
            let y = level + Math.sin(x/30 + s.offset) * waveAmp + (x - W/2) * s.currentTilt;
            ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H); ctx.lineTo(0, H);
        ctx.fillStyle = color; // لون واضح
        ctx.globalAlpha = 0.85;
        ctx.fill();
        
        ctx.restore();
        requestAnimationFrame(render);
    }
    render();
}

// --- وظائف الواجهة المتبقية ---
function renderInventory() {
    const grid = document.getElementById('barrelGrid');
    grid.innerHTML = materials.map(m => `
        <div class="barrel-card">
            <div class="barrel-wrap"><canvas data-matid="${m.id}"></canvas></div>
            <div style="font-weight:800">${m.name}</div>
            <div style="color:var(--accent); font-weight:700">${m.qty} جرام</div>
        </div>
    `).join('');
    grid.querySelectorAll('canvas').forEach(c => {
        const m = materials.find(x => x.id == c.dataset.matid);
        animateLiquid(c, m.color, Math.min(1, m.qty/1000));
    });
}

function navTo(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    toggleMenu();
    if(id === 'inventory') renderInventory();
}

function toggleMenu() {
    document.getElementById('sideMenu').classList.toggle('open');
    document.getElementById('menuOverlay').classList.toggle('show');
}

function openAdd() { document.getElementById('addModal').style.display = 'flex'; document.getElementById('matName').focus(); }
function closeAdd() { document.getElementById('addModal').style.display = 'none'; }
function toast(m) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = m;
    document.getElementById('toasts').appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// تشغيل أولي
renderInventory();
</script>
</body>
</html>
